name: Release PR

on:
  push:
    branches:
      - main

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure release branch exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git ls-remote --exit-code origin release; then
            git checkout -b release
            git push origin release
            git checkout main
          fi

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          PR_NUMBER=$(gh pr list --base release --head main --state open --json number --jq '.[0].number // empty')

          PR_BODY="Merges \`main\` into \`release\` to trigger the build workflow.

> **Merging this PR will publish WireScope v${VERSION} to GitHub Releases.**"

          if [ -z "$PR_NUMBER" ]; then
            gh label create release --color 0075ca --description "Release PR" 2>/dev/null || true
            gh pr create \
              --base release \
              --head main \
              --title "release: v${VERSION}" \
              --body "$PR_BODY" \
              --label release
            echo "Created: release v${VERSION}"
          else
            gh pr edit "$PR_NUMBER" \
              --title "release: v${VERSION}" \
              --body "$PR_BODY"
            echo "Updated PR #${PR_NUMBER}: release v${VERSION}"
          fi
